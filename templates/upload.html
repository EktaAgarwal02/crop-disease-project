<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Crop | AgriScan AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root{
--bg-dark:#0f172a;
--bg-card:rgba(30,41,59,0.85);
--primary:#00ff88;
--text-main:#f8fafc;
--text-muted:#94a3b8;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
color:var(--text-main);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* BACKGROUND IMAGE */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1600&auto=format&fit=crop") center/cover no-repeat;
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(15,23,42,0.85);
z-index:-1;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:1.8rem;
font-weight:900;
}

.logo span{
color:var(--primary);
}

nav a{
color:var(--text-muted);
text-decoration:none;
margin-left:25px;
transition:.3s;
}

nav a:hover{
color:var(--primary);
}

/* CONTAINER */

.container{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:80px 20px;
}

.container h1{
font-size:2.8rem;
margin-bottom:15px;
}

.container p{
color:var(--text-muted);
margin-bottom:40px;
max-width:500px;
}

/* UPLOAD BOX */

.upload-box{
background:var(--bg-card);
border:2px dashed rgba(255,255,255,0.25);
padding:60px;
border-radius:20px;
cursor:pointer;
transition:.3s;
backdrop-filter:blur(10px);
width:350px;
}

.upload-box:hover{
border-color:var(--primary);
transform:scale(1.02);
}

.upload-box i{
font-size:3rem;
color:var(--primary);
margin-bottom:15px;
}

.upload-box p{
color:var(--text-muted);
font-size:1rem;
}

/* PREVIEW */

.preview{
margin-top:40px;
display:none;
}

.preview img{
max-width:300px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* BUTTONS */

.btn{
padding:14px 35px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
margin:10px;
}

.btn-scan{
background:var(--primary);
color:#000;
}

.btn-remove{
background:#ff4d4d;
color:#fff;
}

/* FOOTER */

footer{
padding:25px;
text-align:center;
color:var(--text-muted);
border-top:1px solid rgba(255,255,255,0.05);
}

/* MOBILE */

@media(max-width:768px){

.container h1{
font-size:2rem;
}

.upload-box{
width:90%;
padding:40px;
}

.preview img{
max-width:220px;
}

}

</style>
</head>

<body>

<nav>
<div class="logo">Agri<span>Scan</span></div>

<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>
</nav>

<div class="container">

<h1>Upload Crop Image</h1>

<p>Upload a clear photo of the crop leaf and let our AI detect possible diseases instantly.</p>

<label class="upload-box">

<input type="file" id="fileInput" hidden accept="image/*">

<i class="fas fa-cloud-upload-alt"></i>

<p>Click to Upload Image</p>

</label>

<div class="preview" id="preview">

<img id="previewImg">

<br>

<button class="btn btn-scan">Scan Crop</button>

<button class="btn btn-remove" onclick="removeImage()">Remove</button>

</div>

</div>

<footer>

<p>© 2025 AgriScan AI • Smart Farming with AI</p>

</footer>

<script>

const fileInput=document.getElementById("fileInput")
const preview=document.getElementById("preview")
const previewImg=document.getElementById("previewImg")

fileInput.addEventListener("change",function(){

const file=this.files[0]

if(file){

const reader=new FileReader()

reader.onload=function(e){

previewImg.src=e.target.result
preview.style.display="block"

}

reader.readAsDataURL(file)

}

})

function removeImage(){

fileInput.value=""
preview.style.display="none"

}

</script>

</body>
</html>
