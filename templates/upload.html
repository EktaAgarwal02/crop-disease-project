<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Crop | AgriScan AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root{
--bg-dark:#0f172a;
--bg-card:rgba(30,41,59,0.85);
--primary:#00ff88;
--text-main:#f8fafc;
--text-muted:#94a3b8;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
color:var(--text-main);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* BACKGROUND IMAGE */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1600&auto=format&fit=crop") center/cover no-repeat;
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(15,23,42,0.85);
z-index:-1;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:1.8rem;
font-weight:900;
}

.logo span{
color:var(--primary);
}

nav a{
color:var(--text-muted);
text-decoration:none;
margin-left:25px;
transition:.3s;
}

nav a:hover{
color:var(--primary);
}

/* CONTAINER */

.container{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:80px 20px;
}

.container h1{
font-size:2.8rem;
margin-bottom:15px;
}

.container p{
color:var(--text-muted);
margin-bottom:40px;
max-width:500px;
}

/* UPLOAD BOX */

.upload-container{
background:var(--bg-card);
border:2px dashed rgba(255,255,255,0.25);
padding:60px;
border-radius:20px;
cursor:pointer;
transition:.3s;
backdrop-filter:blur(10px);
width:350px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:300px;
position:relative;
}

.upload-container:hover{
border-color:var(--primary);
transform:scale(1.02);
}

.upload-icon{
font-size:3rem;
color:var(--primary);
margin-bottom:15px;
}

.upload-text p{
color:var(--text-muted);
font-size:1rem;
}

.preview-content{
text-align:center;
width:100%;
}

.preview-content img{
max-width:280px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.hidden{
display:none !important;
}

.preview-hidden{
display:none;
}

/* BUTTONS */

.btn{
padding:14px 35px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
margin:10px;
transition:.3s;
}

.btn-scan{
background:var(--primary);
color:#000;
}

.btn-scan:hover{
background:#00dd77;
transform:scale(1.05);
}

.btn-scan:disabled{
background:#666;
cursor:not-allowed;
}

.btn-remove{
background:#ff4d4d;
color:#fff;
}

.btn-remove:hover{
background:#ff3333;
}

.btn-dashboard{
background:#0066ff;
color:#fff;
margin-top:20px;
}

.btn-dashboard:hover{
background:#0052cc;
}

/* RESULTS */

.results{
background:var(--bg-card);
border:2px solid var(--primary);
padding:40px;
border-radius:15px;
margin-top:40px;
max-width:500px;
backdrop-filter:blur(10px);
display:none;
}

.results.show{
display:block;
animation:slideIn .5s ease-out;
}

@keyframes slideIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.result-item{
margin:20px 0;
text-align:left;
}

.result-label{
color:var(--text-muted);
font-size:0.9rem;
margin-bottom:5px;
}

.result-value{
font-size:1.3rem;
color:var(--primary);
font-weight:700;
}

.confidence-bar{
width:100%;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:10px;
margin-top:5px;
overflow:hidden;
}

.confidence-fill{
height:100%;
background:linear-gradient(90deg, #00ff88, #00dd77);
border-radius:10px;
}

.loading{
display:none;
text-align:center;
}

.spinner{
border:4px solid rgba(0,255,136,0.2);
border-top:4px solid var(--primary);
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.error{
background:#ff4d4d;
color:#fff;
padding:15px;
border-radius:8px;
margin-top:20px;
display:none;
}

/* FOOTER */

footer{
padding:25px;
text-align:center;
color:var(--text-muted);
border-top:1px solid rgba(255,255,255,0.05);
}

/* MOBILE */

@media(max-width:768px){

.container h1{
font-size:2rem;
}

.upload-container{
width:90%;
padding:40px;
min-height:250px;
}

.preview-content img{
max-width:220px;
}

}

</style>
</head>

<body>

<nav>
<div class="logo">Agri<span>Scan</span></div>

<div>
<a href="/dashboard">📊 Dashboard</a>
<a href="/about">About</a>
<a href="/logout" style="color:#ff4d4d;">Logout</a>
</div>
</nav>

<div class="container">

<h1>🌾 Scan Crop Disease</h1>

<p>Upload a clear photo of the crop leaf and let our AI detect possible diseases instantly.</p>

<!-- UNIFIED UPLOAD/PREVIEW BLOCK -->
<div class="upload-container" id="uploadBox">

<input type="file" id="fileInput" hidden accept="image/*">

<!-- UPLOAD STATE -->
<div class="upload-text" id="uploadText">
<i class="fas fa-cloud-upload-alt upload-icon"></i>
<p>Click to Upload Image</p>
</div>

<!-- PREVIEW STATE -->
<div class="preview-content preview-hidden" id="previewContent">
<img id="previewImg" alt="Preview">
<br>
<button class="btn btn-scan" id="scanBtn" onclick="scanImage()">Scan Crop</button>
<button class="btn btn-remove" onclick="removeImage()">Remove</button>
</div>

</div>

<!-- LOADING STATE -->
<div class="loading" id="loading">
<div class="spinner"></div>
<p>Analyzing image...</p>
</div>

<!-- RESULTS -->
<div class="results" id="results">
<div class="result-item">
<div class="result-label">🌱 Detected Disease</div>
<div class="result-value" id="diseaseResult">-</div>
</div>

<div class="result-item">
<div class="result-label">📊 Confidence Level</div>
<div class="confidence-bar">
<div class="confidence-fill" id="confidenceFill" style="width:0%"></div>
</div>
<div class="result-value" id="confidenceResult">0%</div>
</div>

<button class="btn btn-scan" onclick="document.getElementById('preview').style.display='none'; document.getElementById('results').classList.remove('show'); document.getElementById('fileInput').value='';">Scan Another</button>

<button class="btn btn-dashboard" onclick="window.location.href='/dashboard'">View History</button>
</div>

<!-- ERROR MESSAGE -->
<div class="error" id="error"></div>

</div>

<footer>

<p>© 2025 AgriScan AI • Smart Farming with AI</p>

</footer>

<script>

const fileInput = document.getElementById("fileInput");
const previewContent = document.getElementById("previewContent");
const uploadText = document.getElementById("uploadText");
const previewImg = document.getElementById("previewImg");
const results = document.getElementById("results");
const errorDiv = document.getElementById("error");
const loading = document.getElementById("loading");
const uploadBox = document.getElementById("uploadBox");

// Handle file selection
fileInput.addEventListener("change", function(){
    const file = this.files[0];
    
    if(file){
        // Validate file type
        if(!file.type.startsWith('image/')){
            showError("Please upload a valid image file");
            return;
        }
        
        // Validate file size (max 16MB)
        if(file.size > 16 * 1024 * 1024){
            showError("Image size must be less than 16MB");
            return;
        }
        
        const reader = new FileReader();
        
        reader.onload = function(e){
            previewImg.src = e.target.result;
            uploadText.classList.add("preview-hidden");
            previewContent.classList.remove("preview-hidden");
            results.classList.remove("show");
            errorDiv.style.display = "none";
        };
        
        reader.readAsDataURL(file);
    }
});

// Scan image and get prediction
async function scanImage(){
    const file = fileInput.files[0];
    
    if(!file){
        showError("Please select an image first");
        return;
    }
    
    // Show loading state
    loading.style.display = "block";
    previewContent.style.display = "none";
    results.classList.remove("show");
    errorDiv.style.display = "none";
    
    const formData = new FormData();
    formData.append('image', file);
    
    try{
        const response = await fetch('/predict', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if(response.ok){
            // Display results
            displayResults(data.disease, data.confidence);
        } else {
            showError(data.error || "Failed to analyze image");
        }
    } catch(error){
        showError("Network error: " + error.message);
    } finally {
        loading.style.display = "none";
        previewContent.style.display = "block";
    }
}

// Display prediction results
function displayResults(disease, confidence){
    document.getElementById("diseaseResult").textContent = disease;
    document.getElementById("confidenceResult").textContent = confidence + "%";
    document.getElementById("confidenceFill").style.width = confidence + "%";
    
    results.classList.add("show");
}

// Show error message
function showError(message){
    errorDiv.textContent = "❌ " + message;
    errorDiv.style.display = "block";
}

// Remove image
function removeImage(){
    fileInput.value = "";
    uploadText.classList.remove("preview-hidden");
    previewContent.classList.add("preview-hidden");
    results.classList.remove("show");
    errorDiv.style.display = "none";
}

// Allow drag and drop
uploadBox.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = "var(--primary)";
});

uploadBox.addEventListener("dragleave", () => {
    uploadBox.style.borderColor = "rgba(255,255,255,0.25)";
});

uploadBox.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = "rgba(255,255,255,0.25)";
    fileInput.files = e.dataTransfer.files;
    fileInput.dispatchEvent(new Event("change"));
});

// Click to upload
uploadBox.addEventListener("click", (e) => {
    if(e.target !== fileInput && previewContent.classList.contains("preview-hidden")){
        fileInput.click();
    }
});

</script>

</body>
</html>
